# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the agent CLI, e.g. --yolo.
window specifier claude master --dangerously-skip-permissions
window coder claude coder --dangerously-skip-permissions
window cleaner claude cleaner batch --dangerously-skip-permissions
window architect claude architect batch --dangerously-skip-permissions
window hardender claude hardender batch --dangerously-skip-permissions
window QA claude QA batch --dangerously-skip-permissions
