{{define "head"}}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
  :root {
    --accent:#00BCE9; --accent-contrast:#06222E; --accent-hover:#00A3CC; --accent-ink:#0787A8; --accent-soft:#E4F6FC;
    --bg:#F4F7F9; --surface:#FFFFFF; --subtle:#F7FAFB; --line:#E1E8EE; --line-strong:#CBD6E0;
    --ink:#0B1119; --sec:#54657A; --muted:#808D9B; --dim:#B9BFCA;
    --success:#12B76A; --success-soft:#E7F7EF; --warning:#F79009; --warning-soft:#FEF3E6; --danger:#F04438; --danger-soft:#FDECEA;
    --disabled-bg:#F2F4F7;
    --grotesk:"Space Grotesk",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace; --body:"Inter",system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--body); font-size:14px; -webkit-font-smoothing:antialiased; }
  svg { display:block; }
  a { text-decoration:none; color:inherit; }
  button { font-family:var(--body); cursor:pointer; }
  .page { display:flex; flex-direction:column; min-height:100vh; }

  /* App bar */
  .appbar { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border-bottom:1px solid var(--line); padding:14px 32px; }
  .appbar.s2 { height:64px; padding:0 32px; }
  .ab-left { display:flex; align-items:center; gap:28px; }
  .appbar.s2 .ab-left { gap:20px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .logo { width:28px; height:28px; border-radius:8px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; }
  .logo svg { width:16px; height:16px; }
  .brand-name { font-family:var(--grotesk); font-weight:700; font-size:16px; letter-spacing:-0.01em; }
  .vdiv { width:1px; height:24px; background:var(--line); }
  .appbar.s2 .vdiv { height:26px; }

  /* Stepper */
  .pipeline { display:flex; align-items:center; gap:12px; }
  .pstep { display:flex; align-items:center; gap:8px; border-radius:100px; padding:6px 12px; }
  .pstep .pnum { width:20px; height:20px; border-radius:100px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; font-family:var(--body); }
  .pstep .plabel { font-size:13px; font-weight:600; }
  .pstep.active { background:var(--accent-soft); }
  .pstep.active .pnum { background:var(--accent); color:#fff; }
  .pstep.active .plabel { color:var(--accent); }
  .pstep.locked { background:var(--disabled-bg); }
  .pstep.locked .pnum { background:var(--line-strong); color:#fff; }
  .pstep.locked .pnum svg { width:11px; height:11px; }
  .pstep.locked .plabel { color:var(--muted); }
  .pstep.done .pnum { background:var(--success-soft); color:var(--success); }
  .pstep.done .pnum svg { width:13px; height:13px; }
  .pstep.done .plabel { color:var(--sec); }
  .pchev { color:var(--line-strong); display:flex; }
  .pchev svg { width:16px; height:16px; }
  .pconn { width:28px; height:2px; border-radius:1px; background:var(--line-strong); }

  .qa-pill { display:flex; align-items:center; gap:6px; background:var(--subtle); border:1px solid var(--line); border-radius:8px; padding:5px 10px; opacity:0.85; }
  .qa-pill svg { width:13px; height:13px; color:var(--muted); }
  .qa-pill span { font-size:12px; font-weight:500; color:var(--muted); }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; background:var(--accent); color:var(--accent-contrast); border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; }
  .btn:hover { background:var(--accent-hover); }
  .btn svg { width:16px; height:16px; }
  .btn.sec { background:var(--surface); color:var(--ink); border:1px solid var(--line-strong); }
  .btn.sec:hover { background:var(--subtle); }
  .btn.sm { padding:9px 14px; font-size:13px; }
  .btn.sec svg { color:var(--sec); }

  /* Layout */
  .body { display:flex; align-items:flex-start; gap:24px; padding:28px 32px 40px; }
  .main-col { display:flex; flex-direction:column; gap:20px; flex:1 1 0; min-width:0; }
  .side-col { display:flex; flex-direction:column; gap:20px; width:400px; flex-shrink:0; }
  @media (max-width:1080px){ .body{flex-direction:column;} .side-col{width:100%;} }
  .content2 { display:flex; flex-direction:column; gap:28px; padding:32px 40px 48px; }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; }
  .card.pad { padding:24px; display:flex; flex-direction:column; gap:16px; }

  /* Requirement card */
  .rq-head { display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .rq-titles { display:flex; flex-direction:column; gap:2px; }
  .rq-title { font-family:var(--grotesk); font-size:17px; font-weight:700; }
  .rq-sub { color:var(--sec); font-size:13px; }
  .segmented { display:flex; gap:2px; background:var(--disabled-bg); border-radius:10px; padding:3px; }
  .seg { display:flex; align-items:center; gap:6px; border-radius:8px; padding:7px 12px; font-size:13px; color:var(--sec); font-weight:500; background:none; border:1px solid transparent; }
  .seg svg { width:13px; height:13px; }
  .seg.on { background:var(--surface); border-color:var(--line); color:var(--ink); font-weight:600; }
  .ta { width:100%; min-height:140px; background:var(--subtle); border:1px solid var(--line-strong); border-radius:10px; padding:14px; font-size:14px; font-family:var(--body); color:var(--ink); resize:vertical; line-height:21px; }
  .ta::placeholder { color:var(--muted); }
  .rq-foot { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .rq-foot .left { display:flex; align-items:center; gap:12px; }
  .inline-err { display:flex; align-items:center; gap:6px; color:var(--danger); font-size:13px; font-weight:500; }
  .inline-err svg { width:14px; height:14px; }
  .file { font-size:13px; color:var(--sec); }
  :focus-visible { outline:2px solid var(--accent); outline-offset:1px; }

  /* WBS card */
  .wbs-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 24px; border-bottom:1px solid var(--line); }
  .wbs-title { display:flex; align-items:center; gap:10px; }
  .wbs-title svg { width:17px; height:17px; color:var(--sec); }
  .wbs-title .t { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:0.02em; }
  .wbs-title .count { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--muted); }
  .wbs-actions { display:flex; align-items:center; gap:10px; }
  .status-tag { display:flex; align-items:center; gap:6px; padding:0 4px; color:var(--success); font-size:12px; font-weight:700; }
  .status-tag svg { width:15px; height:15px; }
  .status-tag.muted { color:var(--muted); }

  .colhead { display:flex; align-items:center; gap:18px; background:var(--subtle); border-bottom:1px solid var(--line); padding:11px 24px; }
  .colhead .h { color:var(--muted); font-size:11px; font-weight:700; letter-spacing:0.6px; text-align:center; }
  .colhead .h abbr { text-decoration:none; }
  .c-idx{width:44px;} .c-task{flex:1 1 0;min-width:0;text-align:left;} .c-risk{width:64px;} .c-o{width:44px;} .c-m{width:44px;} .c-p{width:48px;} .c-e{width:44px;} .c-sd{width:48px;} .c-rsd{width:64px;} .c-act{width:24px;}
  .colhead .c-o { color:var(--accent-ink); }

  .row { display:flex; align-items:flex-start; gap:18px; padding:20px 24px; border-bottom:1px solid var(--line); }
  .row:last-child { border-bottom:none; }
  .cell { display:flex; justify-content:center; padding-top:2px; }
  .cell.left { justify-content:flex-start; }
  .idx { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--muted); }
  .task { display:flex; flex-direction:column; gap:6px; }
  .task-title-in { font-family:var(--grotesk); font-size:15px; font-weight:700; color:var(--ink); background:none; border:1px solid transparent; border-radius:8px; padding:2px 4px; margin:-2px -4px; width:100%; }
  .task-title-in:hover, .task-title-in:focus { border-color:var(--line-strong); background:var(--surface); outline:none; }
  .risks { display:flex; flex-direction:column; gap:6px; padding-top:2px; }
  .risk-item { display:flex; align-items:center; gap:10px; }
  .risk-item svg { width:13px; height:13px; color:var(--warning); flex-shrink:0; }
  .risk-item .rt { color:var(--sec); font-size:13px; font-weight:500; }
  .add-note { color:var(--accent-ink); font-size:12px; font-weight:600; background:none; border:none; padding:0; }
  .note-form { display:flex; gap:6px; margin-top:4px; }
  .note-form input { flex:1; border:1px solid var(--line-strong); border-radius:8px; padding:5px 8px; font-size:12px; font-family:var(--body); }
  .rbadge { display:inline-flex; align-items:center; background:var(--warning-soft); color:var(--warning); border-radius:999px; padding:4px 10px; font-size:12px; font-weight:600; }
  .num { font-family:var(--mono); font-size:14.5px; color:var(--ink); }
  .num.dim { color:var(--muted); }
  .e-pill { background:var(--accent-soft); border-radius:8px; padding:6px 0; width:44px; display:flex; justify-content:center; }
  .e-pill .num { color:var(--accent-ink); font-weight:600; }
  .sd { font-family:var(--body); font-size:13px; color:var(--sec); }
  .rsd { font-family:var(--body); font-size:13px; color:var(--sec); }
  .kebab { background:none; border:none; color:var(--muted); padding:0; display:flex; }
  .kebab svg { width:18px; height:18px; }
  details.rowmenu { position:relative; }
  details.rowmenu > summary { list-style:none; cursor:pointer; }
  details.rowmenu > summary::-webkit-details-marker { display:none; }
  details.rowmenu .menu { position:absolute; right:0; top:22px; z-index:5; background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 24px rgba(11,17,25,0.12); padding:8px; width:230px; display:flex; flex-direction:column; gap:8px; }
  .menu .lbl { font-size:11px; font-weight:700; letter-spacing:0.5px; color:var(--muted); }
  .menu input { border:1px solid var(--line-strong); border-radius:8px; padding:7px 9px; font-size:13px; font-family:var(--body); width:100%; }
  .menu .triple { display:flex; gap:6px; }
  .menu .triple input { width:100%; font-family:var(--mono); }

  .empty-wbs { padding:40px 24px; color:var(--muted); font-size:14px; text-align:center; }
  .card-foot { display:flex; align-items:flex-end; gap:10px; padding:16px 24px; flex-wrap:wrap; }
  .card-foot form.grow { flex:1 1 240px; display:flex; gap:8px; }
  .card-foot input.add { flex:1; border:1px solid var(--line-strong); border-radius:10px; padding:10px 12px; font-size:14px; font-family:var(--body); }

  /* Metrics & Pricing */
  .mp-head { display:flex; align-items:center; justify-content:space-between; background:var(--ink); padding:16px 20px; border-radius:14px 14px 0 0; }
  .mp-head .titles { display:flex; flex-direction:column; gap:2px; }
  .mp-head .t { color:#fff; font-family:var(--grotesk); font-size:15px; font-weight:700; }
  .mp-head .s { color:var(--dim); font-size:12px; }
  .mp-internal { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.15); border-radius:100px; padding:5px 10px; }
  .mp-internal svg { width:12px; height:12px; color:var(--dim); }
  .mp-internal span { color:var(--dim); font-size:11.5px; font-weight:600; }
  .mp-body { display:flex; flex-direction:column; gap:18px; padding:20px; }
  .mp-section { color:var(--muted); font-size:11px; font-weight:700; letter-spacing:0.6px; }
  .mp-hero { background:var(--accent-soft); border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:2px; }
  .mp-hero .lbl { color:var(--accent); font-size:12.5px; font-weight:600; }
  .mp-hero .valrow { display:flex; align-items:flex-end; gap:6px; }
  .mp-hero .val { font-family:var(--grotesk); font-size:34px; font-weight:800; color:var(--accent-contrast); line-height:1; }
  .mp-hero .unit { color:var(--accent); font-size:14px; font-weight:600; }
  .mp-hero .note { color:var(--accent); font-size:11.5px; }
  .mp-twoup { display:flex; gap:12px; }
  .mp-stat { flex:1; background:var(--subtle); border:1px solid var(--line); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:3px; }
  .mp-stat .lbl { color:var(--sec); font-size:11.5px; font-weight:600; }
  .mp-stat .val { font-family:var(--grotesk); font-size:19px; font-weight:700; color:var(--ink); }
  .mp-stat .note { color:var(--muted); font-size:11px; }
  .mp-divider { height:1px; background:var(--line); }
  .gauge .bars { display:flex; align-items:center; gap:6px; }
  .gauge .seg { flex:1; height:8px; border-radius:100px; opacity:0.3; }
  .gauge .seg.g{background:var(--success);} .gauge .seg.y{background:var(--warning);} .gauge .seg.r{background:var(--danger);}
  .gauge .seg.on { opacity:1; height:12px; }
  .gauge .labels { display:flex; justify-content:space-between; margin-top:8px; }
  .gauge .labels span { font-size:11.5px; font-weight:500; color:var(--muted); }
  .gauge .labels .mid { font-weight:700; text-transform:capitalize; }
  .gauge .labels .mid.g{color:var(--success);} .gauge .labels .mid.y{color:var(--warning);} .gauge .labels .mid.r{color:var(--danger);}
  .kv-table { border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .kv-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--line); }
  .kv-row:last-child { border-bottom:none; }
  .kv-row.alt { background:var(--subtle); }
  .kv-row .k { color:var(--sec); font-size:13px; }
  .kv-row .v { color:var(--ink); font-size:13px; font-weight:600; }
  .kv-badge { background:var(--warning-soft); color:var(--warning); border-radius:100px; padding:3px 10px; font-size:12.5px; font-weight:700; text-transform:capitalize; }
  .kv-badge.g{background:var(--success-soft);color:var(--success);} .kv-badge.r{background:var(--danger-soft);color:var(--danger);}
  .mp-caption { display:flex; gap:7px; background:var(--subtle); border-radius:10px; padding:10px 12px; }
  .mp-caption svg { width:13px; height:13px; color:var(--muted); flex-shrink:0; margin-top:1px; }
  .mp-caption span { color:var(--muted); font-size:11.5px; line-height:17px; }
  .mp-body.locked-note { color:var(--muted); font-size:13px; }

  /* Stage 2 */
  .t2-inputs { display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; }
  .t2-field { display:flex; flex-direction:column; gap:7px; flex:1 1 160px; }
  .t2-field label { color:var(--sec); font-size:12px; font-weight:600; }
  .t2-input { display:flex; align-items:center; justify-content:space-between; gap:6px; background:var(--surface); border:1px solid var(--line-strong); border-radius:10px; padding:0 14px; height:44px; }
  .t2-input input { border:none; outline:none; font-family:var(--grotesk); font-size:16px; font-weight:600; color:var(--ink); width:100%; background:none; }
  .t2-input .unit { color:var(--muted); font-size:12px; font-weight:500; white-space:nowrap; }
  .doc { padding:0; overflow:hidden; }
  .doc-head { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; background:var(--subtle); border-bottom:1px solid var(--line); padding:32px; }
  .doc-eyebrow { color:var(--accent-ink); font-size:12px; font-weight:700; letter-spacing:1.2px; }
  .doc-title { font-family:var(--grotesk); font-size:28px; font-weight:800; margin:8px 0; }
  .doc-meta { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .doc-meta .m { display:flex; align-items:center; gap:6px; color:var(--sec); font-size:13px; }
  .doc-meta .m svg { width:14px; height:14px; color:var(--muted); }
  .doc-badges { display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
  .pbadge { display:flex; align-items:center; gap:8px; border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; }
  .pbadge svg { width:14px; height:14px; }
  .pbadge.conf { background:var(--warning-soft); color:var(--warning); }
  .pbadge.conf.high { background:var(--success-soft); color:var(--success); }
  .pbadge.conf.lower { background:var(--danger-soft); color:var(--danger); }
  .pbadge.contract { background:var(--accent-soft); color:var(--accent-ink); }
  .hero-stats { display:flex; gap:20px; padding:28px 32px; flex-wrap:wrap; }
  .hstat { flex:1 1 260px; border-radius:14px; padding:24px; display:flex; flex-direction:column; gap:14px; }
  .hstat.invest { background:var(--accent-soft); border:1px solid var(--accent-ink); }
  .hstat.time { background:var(--subtle); border:1px solid var(--line); }
  .hstat .erow { display:flex; align-items:center; gap:8px; }
  .hstat .erow svg { width:16px; height:16px; }
  .hstat.invest .erow { color:var(--accent-ink); }
  .hstat.time .erow { color:var(--sec); }
  .hstat .eb { font-size:13px; font-weight:700; letter-spacing:0.02em; }
  .hstat .vrow { display:flex; align-items:flex-end; gap:10px; }
  .hstat .fig { font-family:var(--mono); font-size:36px; font-weight:800; color:var(--ink); line-height:1; }
  .hstat.invest .fig { color:var(--accent-contrast); }
  .hstat .funit { color:var(--muted); font-size:15px; font-weight:500; }
  .hstat .hnote { color:var(--sec); font-size:13px; }
  .doc-body { display:flex; flex-direction:column; gap:28px; padding:4px 32px 32px; }
  .sec-title { font-family:var(--grotesk); font-size:18px; font-weight:700; }
  .sec-sub { color:var(--sec); font-size:13px; margin-top:4px; }
  .prob-row { display:flex; gap:16px; flex-wrap:wrap; }
  .prob { flex:1 1 300px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .prob .top { display:flex; align-items:center; justify-content:space-between; }
  .prob .plabel { color:var(--sec); font-size:13px; font-weight:600; }
  .prob .ptarget { font-family:var(--mono); font-size:15px; font-weight:600; color:var(--ink); margin-top:2px; }
  .prob .pct { font-family:var(--grotesk); font-size:22px; font-weight:800; color:var(--ink); }
  .track { height:8px; border-radius:4px; overflow:hidden; }
  .track.lo { background:var(--warning-soft); } .track.hi { background:var(--success-soft); }
  .track .fill { height:8px; border-radius:4px; }
  .track.lo .fill { background:var(--warning); } .track.hi .fill { background:var(--success); }
  .contract-card { display:flex; gap:24px; background:var(--subtle); border:1px solid var(--line); border-radius:14px; padding:22px; flex-wrap:wrap; }
  .contract-card .col { display:flex; flex-direction:column; gap:6px; }
  .contract-card .k { color:var(--muted); font-size:12px; font-weight:600; letter-spacing:0.5px; }
  .contract-card .v { font-family:var(--grotesk); font-size:16px; font-weight:700; }
  .contract-card .d { color:var(--sec); font-size:13px; }
  .contract-card .cdiv { width:1px; background:var(--line); align-self:stretch; }
  .reneg-head { display:flex; align-items:center; gap:10px; }
  .reneg-pill { display:flex; align-items:center; gap:5px; background:var(--success-soft); color:var(--success); border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; }
  .reneg-pill.no { background:var(--disabled-bg); color:var(--sec); }
  .reneg-pill svg { width:12px; height:12px; }
  .sa { display:flex; gap:20px; flex-wrap:wrap; }
  .sa-card { flex:1 1 320px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:24px; display:flex; flex-direction:column; gap:16px; }
  .sa-head { display:flex; align-items:center; gap:8px; }
  .sa-head svg { width:18px; height:18px; color:var(--accent-ink); }
  .sa-head .t { font-family:var(--grotesk); font-size:16px; font-weight:700; }
  .scope-item { display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); }
  .scope-item:last-child { border-bottom:none; }
  .scope-check { width:22px; height:22px; border-radius:11px; background:var(--accent-soft); color:var(--accent-ink); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .scope-check svg { width:13px; height:13px; }
  .scope-item .st { color:var(--ink); font-size:14px; font-weight:600; }
  .assume { display:flex; gap:10px; align-items:flex-start; }
  .assume svg { width:16px; height:16px; color:var(--success); flex-shrink:0; margin-top:1px; }
